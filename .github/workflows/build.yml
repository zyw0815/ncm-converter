name: Build

# 推送 v* 标签（如 v1.0.0）时自动在 macOS 与 Windows 上各自打包；
# 也可在 Actions 页面手动触发（workflow_dispatch）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: NCM-Converter-macos
          - os: windows-latest
            artifact: NCM-Converter-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Build
        run: pyinstaller build.spec --noconfirm

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/NCM-Converter.app" "${{ matrix.artifact }}.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/NCM-Converter/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
